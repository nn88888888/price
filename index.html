<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>✨聪明如你的售价计算器 ✨</title>
    <style>
        /* 少女系玫粉色主题 */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #ffe6f2 0%, #ffcce6 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 50px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(255, 105, 180, 0.2);
            width: 100%;
            max-width: 600px;
        }
        h2 {
            color: #e60073;
            text-align: center;
            margin-bottom: 15px;
            font-size: 26px;
        }
        /* 表情包样式 */
        .meme-img {
            display: block;
            width: 140px;
            margin: 0 auto 25px auto;
            border-radius: 16px;
            box-shadow: 0 4px 12px rgba(255, 105, 180, 0.15);
        }
        .form-group { margin-bottom: 25px; }
        label {
            display: block;
            margin-bottom: 8px;
            color: #d4145a;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 2px solid #ffb3d9;
            border-radius: 12px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
            color: #333;
            background-color: #fff;
        }
        input:focus, select:focus {
            border-color: #ff66b2;
            box-shadow: 0 0 8px rgba(255, 102, 178, 0.3);
        }
        button {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(to right, #ff66b2, #e60073);
            color: white;
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(230, 0, 115, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(230, 0, 115, 0.4);
        }
        #result {
            margin-top: 30px;
            padding: 20px;
            background: #fff0f5;
            border-radius: 12px;
            border: 1px dashed #ffb3d9;
            text-align: center;
            display: none;
        }
        .price-row {
            margin: 10px 0;
            font-size: 18px;
            color: #666;
        }
        .price-val {
            font-size: 26px;
            font-weight: bold;
        }
        .min-price { color: #ff80bf; }
        .suggested-price { color: #e60073; }
    </style>
</head>
<body>
    <div class="container">
        <h2>✨ 聪明如你的售价计算器 ✨</h2>
        
        <img src="sheep.jpg" alt="嘿嘿小羊" class="meme-img">
        
        <div class="form-group">
            <label>🎀 选择衣物类目</label>
            <select id="category" onchange="toggleCustomShipping()">
                <option value="15">吊带</option>
                <option value="28">短裙 / T恤</option>
                <option value="65">牛仔裤 / 厚长裙</option>
                <option value="70">厚卫衣</option>
                <option value="custom">-- 其他（手动输入运费） --</option>
            </select>
        </div>

        <div class="form-group" id="customShippingGroup" style="display: none;">
            <label>📦 预估运费 (元)</label>
            <input type="number" id="shipping" placeholder="输入具体运费">
        </div>

        <div class="form-group">
            <label>💰 产品原价成本 (含产品和进货运费) (元)</label>
            <input type="number" id="cost" placeholder="输入总成本">
        </div>

        <button onclick="calculatePrice()">💖 一键获取售价 💖</button>

        <div id="result"></div>
    </div>

    <script>
        function toggleCustomShipping() {
            const category = document.getElementById('category').value;
            const customGroup = document.getElementById('customShippingGroup');
            if (category === 'custom') {
                customGroup.style.display = 'block';
            } else {
                customGroup.style.display = 'none';
            }
        }

        async function calculatePrice() {
            const categoryValue = document.getElementById('category').value;
            let shipping;
            
            if (categoryValue === 'custom') {
                shipping = document.getElementById('shipping').value;
            } else {
                shipping = categoryValue; 
            }

            const cost = document.getElementById('cost').value;

            if (!shipping || !cost) {
                alert("请填写完整的成本信息哦！✨");
                return;
            }

            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerText = "🌸 正在努力计算中...";

            try {
                const response = await fetch('/api/calculate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ shipping: Number(shipping), cost: Number(cost) })
                });
                
                const data = await response.json();
                
                if(data.success) {
                    resultDiv.innerHTML = `
                        <div class="price-row">最低售价: <span class="price-val min-price">£${data.minPrice}</span></div>
                        <div class="price-row">建议标价: <span class="price-val suggested-price">£${data.suggestedPrice}</span></div>
                    `;
                } else {
                    resultDiv.innerText = "哎呀，计算出错了，请稍后再试 🥺";
                }
            } catch (error) {
                resultDiv.innerText = "网络有点小情绪，请刷新试试 🥺";
            }
        }
        
        toggleCustomShipping();
    </script>
</body>
</html>
